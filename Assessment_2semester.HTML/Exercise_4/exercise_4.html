<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wondering Photographer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Skip link - lets keyboard users jump past the header straight to the content -->
    <a href="#main-content" class="skip-link">Skip to main content</a>


    <!-- HEADER - contains the site title, decorative image, nav and cart link -->
    <header>

        <!-- h1 gives the page its main title - every page needs exactly one h1 -->
        <h1>The Wondering Photographer</h1>

        <!-- alt="" because this is decorative - screen readers skip it -->
        <img src="TheDivider.png" alt="" class="divider">

        <!-- Main navigation - ul and li give proper list structure -->
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About me</a></li>
            </ul>
        </nav>

        <!-- aria-label describes what the link does, not just what the icon looks like -->
        <!-- img alt="" because the link aria-label already covers the purpose -->
        <a href="checkout.html" aria-label="Go to checkout page" class="cart-link">
            <img src="shopping.svg" alt="">
        </a>

    </header>


    <!-- MAIN - id="main-content" is the target for the skip link above -->
    <main id="main-content">

        <!-- h2 gives screen reader users a heading to navigate to inside main -->
        <h2>Photo Gallery</h2>


        <!-- PHOTO CARD 1 -->
        <!-- article is the correct semantic element for self-contained content -->
        <article class="photo-card">

            <!-- h3 because it sits inside the h2 Photo Gallery section -->
            <h3>Greenland Coast</h3>

            <!-- figure groups the image and caption together semantically -->
            <figure>

                <!-- Descriptive alt text tells screen reader users what is in the photo -->
                <img
                    src="OceanPhoto.jpg"
                    alt="Two people sitting on white chalk cliffs above a calm turquoise sea at sunset">

                <!-- figcaption labels the caption as belonging to this image -->
                <figcaption>
                    <!-- Typo fixed: original said "cost of Greenland" not "coast" -->
                    This was from a fabulous trip to the coast of Greenland with my family.
                    The water was lovely — but very cold!
                </figcaption>

            </figure>

            <!-- aria-label makes each button unique so screen readers can tell them apart -->
            <!-- Without this all four buttons just say "Add to basket" with no context -->
            <button type="button" aria-label="Add Greenland coast photo to basket">
                Add to basket
            </button>

        </article>


        <!-- PHOTO CARD 2 -->
        <article class="photo-card">

            <h3>Golden Gate Bridge</h3>

            <figure>

                <img
                    src="BridgePhoto.jpg"
                    alt="Looking straight up at a tall red steel tower of the Golden Gate Bridge against a blue sky">

                <figcaption>
                    <!-- Factual error fixed: original said New York - the bridge is in San Francisco -->
                    A picture of the Golden Gate Bridge in San Francisco, California.
                </figcaption>

            </figure>

            <button type="button" aria-label="Add Golden Gate Bridge photo to basket">
                Add to basket
            </button>

        </article>


        <!-- PHOTO CARD 3 -->
        <article class="photo-card">

            <h3>Greenland Valley</h3>

            <figure>

                <img
                    src="ValleyPhoto.jpg"
                    alt="A wide valley with a deep blue fjord surrounded by rocky mountains under a cloudy sky">

                <figcaption>
                    Another great photo from Greenland.
                    It is a river valley where a glacier used to be.
                </figcaption>

            </figure>

            <button type="button" aria-label="Add Greenland valley photo to basket">
                Add to basket
            </button>

        </article>


        <!-- PHOTO CARD 4 -->
        <article class="photo-card">

            <h3>Waterfall</h3>

            <figure>

                <img
                    src="WaterfallPhoto.jpg"
                    alt="A powerful waterfall crashing down into a misty pool surrounded by green mossy rocks">

                <figcaption>
                    The waterfall made such a lovely sound. I could have fallen asleep!
                </figcaption>

            </figure>

            <button type="button" aria-label="Add waterfall photo to basket">
                Add to basket
            </button>

        </article>

    </main>
    <footer>
        <p>Copyright The Wondering Photographer 2018.</p>
    </footer>

</body>

</html>
